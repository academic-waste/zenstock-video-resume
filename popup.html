<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZenStock Video Resume</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        background: #fbfaf7;
        color: #202124;
        margin: 0;
        min-width: 320px;
      }

      main {
        padding: 14px;
      }

      h1 {
        font-size: 15px;
        line-height: 1.2;
        margin: 0 0 10px;
      }

      .summary {
        color: #5f6368;
        font-size: 12px;
        margin: 0 0 12px;
      }

      .list {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
        max-height: 260px;
        overflow: auto;
      }

      .item {
        background: #ffffff;
        border: 1px solid #dedbd2;
        border-radius: 8px;
        padding: 9px;
      }

      .title {
        font-size: 12px;
        font-weight: 650;
        line-height: 1.35;
        margin-bottom: 4px;
        overflow-wrap: anywhere;
      }

      .meta {
        color: #6b6f76;
        font-size: 11px;
        line-height: 1.4;
      }

      button {
        background: #202124;
        border: 0;
        border-radius: 7px;
        color: #ffffff;
        cursor: pointer;
        font: 650 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 8px 10px;
        width: 100%;
      }

      button:disabled {
        cursor: default;
        opacity: 0.45;
      }

      .empty {
        background: #ffffff;
        border: 1px dashed #c9c4ba;
        border-radius: 8px;
        color: #6b6f76;
        font-size: 12px;
        padding: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ZenStock Video Resume</h1>
      <p class="summary" id="summary">Loading saved positions...</p>
      <div class="list" id="list"></div>
      <button id="clear" type="button" disabled>Clear saved positions</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
